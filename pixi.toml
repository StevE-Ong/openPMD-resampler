[project]
name = "openPMD-resampler"
version = "0.5.1"
description = "A Python package to export particle data from openPMD to text format"
authors = ["Andrei Berceanu <andreicberceanu@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-ppc64le"]

[system-requirements]
linux = "5.4.0"

[tasks]
usage = "python usage.py --opmd_path h5/lwfa.h5 --species e_highGamma --reduction_factor 2"
start = "python start.py"

[dependencies]
python = "3.11.*"
openpmd-api = "0.15.*"
pandas = "2.0.*"
datashader = "0.15.*"
matplotlib = "3.7.*"
scipy = ">=1.10"
# dask.dataframe (pulled in by datashader) imports pyarrow at runtime but the
# conda metadata does not declare it.
pyarrow = "*"

# The default environment gets the CPU build of PyTorch (no CUDA system
# requirement, so the solver cannot pick a CUDA build); the cuda environment
# below upgrades it to the GPU build.
[target.linux-64.dependencies]
pytorch = "2.*"

# GPU support is opt-in: `pixi run -e cuda start ...` on a machine with an
# NVIDIA driver. Only this environment requires CUDA.
[feature.cuda]
platforms = ["linux-64"]

[feature.cuda.system-requirements]
cuda = "12"

[feature.cuda.target.linux-64.dependencies]
pytorch-gpu = "2.*"

[feature.test.dependencies]
pytest = ">=7"

[feature.test.tasks]
test = "python -m pytest tests"

[environments]
cuda = ["cuda"]
test = ["test"]
test-cuda = ["test", "cuda"]
